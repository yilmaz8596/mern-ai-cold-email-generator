# Development Compose: runs the `dev` stage for live reload.
# - Builds the `dev` target from api/Dockerfile and bind-mounts the source.
# - Keeps /app/node_modules as an anonymous volume so container-installed modules are preserved.
# Usage: `docker compose -f docker-compose.dev.yml up --build`
services:
  # MongoDB dev service (use your local image if available)
  # - Replace `image` with your local/community image if preferred.
  # - `MONGO_INITDB_*` variables initialize a root user and an optional default DB.
  # - `healthcheck` helps detect readiness; adjust the command if `mongosh` is not present.
  db:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ai-cold-email-dev
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017" # optional: expose to host for local access
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --eval "db.adminCommand(''ping'')" --quiet >/dev/null 2>&1 || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./api:/app:delegated
      - /app/node_modules
    env_file:
      - ./api/.env
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=5000
      # API connection string for development (matches DB credentials above)
      - MONGO_URI=mongodb://admin:admin123@db:27017/ai-cold-email-dev?authSource=admin
      # Redis connection: prefer value from ./api/.env (Upstash) or host env.
      # The shell command below will default to the local redis service when
      # `REDIS_URL` is not provided in env files or the environment.
      # Polling is required on Windows/Docker Desktop so tsx watch detects
      # file changes from the bind-mounted Windows filesystem.
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
    ports:
      - "5000:5000"
    command: sh -c 'export REDIS_URL=${REDIS_URL:-redis://redis:6379} && npm run dev'
    depends_on:
      - db
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./client:/app:delegated
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=5173
      - VITE_HOST=0.0.0.0
      # Tells vite.config.ts where to proxy /api/* requests.
      # Inside Docker the API container is reachable by service name.
      - VITE_API_TARGET=http://api:5000
      # Base URL that client code can use to call the API from the browser.
      # Use `http://localhost:5000` so the browser can reach the API mapped on the host.
      - VITE_API_URL=http://localhost:5000
      # Polling is required on Windows/Docker Desktop so Vite detects
      # file changes from the bind-mounted Windows filesystem.
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

volumes:
  mongo-data:
  redis-data:

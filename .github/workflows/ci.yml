name: CI — Build client and api

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend (api)
        working-directory: api
        run: |
          npm install
          npm run build

      - name: Build frontend (client)
        working-directory: client
        run: |
          npm install
          npm run build

      - name: Success
        run: echo "Client and API built successfully"

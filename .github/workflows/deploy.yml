name: CD — Build, Push to ECR, Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPO_FRONTEND: ${{ secrets.ECR_REPO_FRONTEND }}
  ECR_REPO_BACKEND: ${{ secrets.ECR_REPO_BACKEND }}
  FRONTEND_CLUSTER: ${{ secrets.FRONTEND_CLUSTER }}
  FRONTEND_SERVICE: ${{ secrets.FRONTEND_SERVICE }}
  BACKEND_CLUSTER: ${{ secrets.BACKEND_CLUSTER }}
  BACKEND_SERVICE: ${{ secrets.BACKEND_SERVICE }}
  FRONTEND_CONTAINER_NAME: ${{ secrets.FRONTEND_CONTAINER_NAME }}
  BACKEND_CONTAINER_NAME: ${{ secrets.BACKEND_CONTAINER_NAME }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - runner + env presence
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "Runner: $(uname -a)"
          echo "docker: $(docker --version 2>/dev/null || echo 'not available')"
          echo "aws: $(aws --version 2>/dev/null || echo 'not available')"
          check(){ if [ -z "${!1}" ]; then echo "$1: MISSING"; else echo "$1: PRESENT"; fi }
          check AWS_ACCOUNT_ID
          check AWS_REGION
          check ECR_REPO_FRONTEND
          check ECR_REPO_BACKEND
          check FRONTEND_CLUSTER
          check FRONTEND_SERVICE
          check BACKEND_CLUSTER
          check BACKEND_SERVICE
          check FRONTEND_CONTAINER_NAME
          check BACKEND_CONTAINER_NAME

      - name: Validate required secrets
        run: |
          set -e
          echo "Checking required secrets/env vars..."
          REQUIRED=(AWS_ACCOUNT_ID AWS_REGION ECR_REPO_FRONTEND ECR_REPO_BACKEND)
          MISSING=()
          for v in "${REQUIRED[@]}"; do
            if [ -z "${!v}" ]; then
              MISSING+=("$v")
            fi
          done
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "Missing required secrets/env vars: ${MISSING[*]}"
            exit 1
          fi
          echo "All required secrets present."

      - name: Configure AWS credentials (OIDC role)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image tags
        run: |
          set -e
          SHORT_SHA=$(printf "%.8s" "$GITHUB_SHA")
          IMAGE_TAG="${SHORT_SHA}-${GITHUB_RUN_ID}-$(date +%s%N)-$RANDOM"
          FRONTEND_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_FRONTEND}:${IMAGE_TAG}"
          BACKEND_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_BACKEND}:${IMAGE_TAG}"
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_ENV
          if [[ -z "$SHORT_SHA" ]]; then
            echo "ERROR: SHORT_SHA is empty"
            exit 1
          fi

      - name: Build and push frontend
        run: |
          set -e
          echo "Building frontend image: $FRONTEND_IMAGE"
          # Ensure Vite env vars are present at build time by writing client/.env
          # These secrets should be set in the repo: VITE_LS_VARIANT_STARTER, VITE_LS_VARIANT_PRO
          echo "VITE_LS_VARIANT_STARTER=${{ secrets.VITE_LS_VARIANT_STARTER }}" > client/.env
          echo "VITE_LS_VARIANT_PRO=${{ secrets.VITE_LS_VARIANT_PRO }}" >> client/.env
          echo "--- client/.env ---"
          cat client/.env || true
          # Fail early if the Vite variant secrets are not set so we don't build a broken frontend
          if ! grep -q "VITE_LS_VARIANT_STARTER=" client/.env || ! grep -q "VITE_LS_VARIANT_PRO=" client/.env; then
            echo "ERROR: One or more VITE_LS_VARIANT_* values are missing in client/.env"
            exit 1
          fi
          cd client
          docker build -t "$FRONTEND_IMAGE" --progress=plain .
          docker push "$FRONTEND_IMAGE"

      - name: Build and push backend
        run: |
          set -e
          echo "Building backend image: $BACKEND_IMAGE"
          cd api
          docker build -t "$BACKEND_IMAGE" --progress=plain .
          docker push "$BACKEND_IMAGE"

      - name: Update ECS task definition and deploy (frontend)
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          CLUSTER: ${{ env.FRONTEND_CLUSTER }}
          SERVICE: ${{ env.FRONTEND_SERVICE }}
          CONTAINER_NAME: ${{ env.FRONTEND_CONTAINER_NAME }}
          NEW_IMAGE: ${{ env.FRONTEND_IMAGE }}
        run: |
          set -e
          echo "Describing current task definition for service $SERVICE"
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query 'services[0].taskDefinition' --output text)
          echo "Current task def: $CURRENT_TASK_DEF_ARN"
          aws ecs describe-task-definition --task-definition "$CURRENT_TASK_DEF_ARN" > taskdef.json
          jq '.taskDefinition | del(.status, .revision, .taskDefinitionArn, .compatibilities, .requiresAttributes, .registeredAt, .registeredBy)' taskdef.json > taskdef.clean.json
          jq --arg name "$CONTAINER_NAME" --arg image "$NEW_IMAGE" '(.containerDefinitions[] | select(.name==$name) .image) = $image' taskdef.clean.json > taskdef.updated.json
          NEW_REG=$(aws ecs register-task-definition --cli-input-json file://taskdef.updated.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered new task def: $NEW_REG"
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --task-definition "$NEW_REG"
          echo "Waiting for service $SERVICE to reach a stable state..."
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"
          echo "Service $SERVICE is stable."

      - name: Update ECS task definition and deploy (backend)
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          CLUSTER: ${{ env.BACKEND_CLUSTER }}
          SERVICE: ${{ env.BACKEND_SERVICE }}
          CONTAINER_NAME: ${{ env.BACKEND_CONTAINER_NAME }}
          NEW_IMAGE: ${{ env.BACKEND_IMAGE }}
        run: |
          set -e
          echo "Describing current task definition for service $SERVICE"
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query 'services[0].taskDefinition' --output text)
          echo "Current task def: $CURRENT_TASK_DEF_ARN"
          aws ecs describe-task-definition --task-definition "$CURRENT_TASK_DEF_ARN" > taskdef.json
          jq '.taskDefinition | del(.status, .revision, .taskDefinitionArn, .compatibilities, .requiresAttributes, .registeredAt, .registeredBy)' taskdef.json > taskdef.clean.json
          jq --arg name "$CONTAINER_NAME" --arg image "$NEW_IMAGE" '(.containerDefinitions[] | select(.name==$name) .image) = $image' taskdef.clean.json > taskdef.updated.json
          # Inject LS variant env vars into the backend container so the webhook mapping works.
          # These secrets should be set in the repo: LS_VARIANT_STARTER, LS_VARIANT_PRO
          if [ -z "${{ secrets.LS_VARIANT_STARTER }}" ] || [ -z "${{ secrets.LS_VARIANT_PRO }}" ]; then
            echo "Warning: LS_VARIANT_STARTER or LS_VARIANT_PRO secret is empty — backend will not receive variant IDs."
          else
            jq --arg name "$CONTAINER_NAME" \
               --arg ls1 "${{ secrets.LS_VARIANT_STARTER }}" \
               --arg ls2 "${{ secrets.LS_VARIANT_PRO }}" \
               '(.containerDefinitions[] | select(.name==$name) .environment) |= ((. // []) | map(select(.name != "LS_VARIANT_STARTER" and .name != "LS_VARIANT_PRO")) + [{name:"LS_VARIANT_STARTER", value:$ls1}, {name:"LS_VARIANT_PRO", value:$ls2}])' \
               taskdef.updated.json > taskdef.updated2.json && mv taskdef.updated2.json taskdef.updated.json
          fi
          NEW_REG=$(aws ecs register-task-definition --cli-input-json file://taskdef.updated.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered new task def: $NEW_REG"
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --task-definition "$NEW_REG"
          echo "Waiting for service $SERVICE to reach a stable state..."
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"
          echo "Service $SERVICE is stable."

      - name: Done
        run: echo "Images pushed and services updated."

      - name: Invalidate CloudFront cache for assets
        if: always()
        env:
          SITE_DOMAINS: "www.sitesolutions.info sitesolutions.info"
        run: |
          set -e
          echo "Looking up CloudFront distribution for: $SITE_DOMAINS"
          DIST_ID=$(aws cloudfront list-distributions --output json | jq -r '.DistributionList.Items[] | select(.Aliases.Items[]?=="www.sitesolutions.info" or .Aliases.Items[]?=="sitesolutions.info") | .Id' | head -n1 || true)
          if [ -z "$DIST_ID" ]; then
            echo "No CloudFront distribution found for aliases: $SITE_DOMAINS. Skipping invalidation."
            exit 0
          fi
          echo "Found distribution: $DIST_ID — creating invalidation for /assets/*"
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/assets/*" --caller-reference "deploy-${GITHUB_RUN_ID}-$(date +%s)"
          echo "Invalidation requested (may take a minute or two to propagate)."
